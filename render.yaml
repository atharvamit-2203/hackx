services:
  - type: web
    name: plugmind-backend
    runtime: python
    plan: free
    rootDir: Backend
    buildCommand: "pip install requests fastapi uvicorn python-multipart python-dotenv pymongo firebase-admin pyyaml joblib numpy"
    startCommand: "python api/index.py"
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PORT
        value: "10000"
    healthCheckPath: "/health"
    autoDeploy: true

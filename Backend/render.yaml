services:
  - type: web
    name: plugmind-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && pip install fastapi uvicorn"
    startCommand: "python api/index.py"
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
